<!DOCTYPE html>
<html>
<head>
    <title>My First Web Page</title>
    <style>
        header{
            background: lightblue;
            padding: 20px;
            text-align: center;
        }

        nav{
            background: lightgreen;
            padding: 10px;
            text-align: center;
        }

        section{
            width: 70%;
            background: lightyellow;
            float: left;
            height: 200px;
        }

        article{
            padding: 20px;
        }

        aside{
            width: 30%;
            background: lightgray;
            float: right;
            height: 200px;
            text-align: center;
        }

        footer{
            clear: both;
            background: lightcoral;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        Home | About | Contact
    </nav>

    <section>
        <article>
            <h2>Web Development</h2>
            <p>I am learning HTML and CSS.</p>
        </article>
    </section>

    <aside>
        Advertisement Area
    </aside>

    <footer>
        © 2026 My Website
    </footer>

</body>
</html>
